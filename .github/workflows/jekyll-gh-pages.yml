# Workflow for building and deploying a Jekyll site to GitHub Pages with custom domain
name: Deploy Jekyll to bazlur.com

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
  
  # Run after website-scraper workflow completes
  workflow_run:
    workflows: ["Daily Website Scraping"]
    types:
      - completed

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Fetch Substack newsletter posts
        run: bash scripts/fetch-substack.sh
      - name: Install Node dependencies
        run: npm ci
      - name: Build with Jekyll
        run: bundle exec jekyll build
      - name: Render syntax-highlighted code blocks
        run: node scripts/render-code-blocks.mjs
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
