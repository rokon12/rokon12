---
layout: compress
---
<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

{% include head.html %}

<body>
    <header class="site-header">
        <div class="header-wrapper">
            <a class="site-title" href="{{ "/" | relative_url }}">{{ site.author.name }}</a>
            <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">
                <span class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
            </button>
            <nav class="site-nav">
                <a class="nav-link" href="{{ "/archive" | relative_url }}">Writing</a>
                <a class="nav-link" href="https://bazlur.com/conference/" target="_blank" rel="noopener">Speaking</a>
                <a class="nav-link" href="{{ "/about" | relative_url }}">About</a>
                <a class="nav-link nav-icon" href="{{ "/search" | relative_url }}" aria-label="Search">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                    </svg>
                </a>
                <a class="nav-link nav-icon" href="{{ "/feed.xml" | relative_url }}" aria-label="RSS Feed">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
                    </svg>
                </a>
            </nav>
        </div>
    </header>

    <main class="page-content" aria-label="Content">
        {{ content }}
    </main>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; {{ site.time | date: '%Y' }} {{ site.author.name }}</p>
            <p>
                <a href="{{ "/feed.xml" | relative_url }}">RSS</a> &bull;
                <a href="https://github.com/rokon12">GitHub</a> &bull;
                <a href="https://www.linkedin.com/in/bazlur/">LinkedIn</a> &bull;
                <a href="https://x.com/{{ site.twitter.username }}">X</a>
            </p>
        </div>
    </footer>

    {% if page.layout == 'post' %}
    <div class="reading-progress" id="reading-progress"></div>
    {% endif %}

    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="18 15 12 9 6 15"></polyline>
        </svg>
    </button>

    {% include scripts.html %}
</body>
</html>
